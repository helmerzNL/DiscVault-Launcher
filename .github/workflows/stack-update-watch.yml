name: Stack Image Update Watch

on:
  schedule:
    - cron: "7 */4 * * *"
    - cron: "17 */4 * * *"
    - cron: "37 */4 * * *"
    - cron: "47 */4 * * *"
    - cron: "27 */4 * * *"
  workflow_dispatch:
    inputs:
      stack_image:
        description: DiscVault app image to watch.
        required: false
        default: ghcr.io/helmerznl/discvault:beta
      launcher_tag:
        description: Launcher tag to publish when the stack image changes.
        required: false
        default: beta
      force:
        description: Build even when the stack digest has not changed.
        required: false
        type: boolean
        default: false

concurrency:
  group: stack-update-watch-${{ github.event.inputs.launcher_tag || github.event.schedule || 'beta' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: helmerznl/discvault-launcher

jobs:
  publish-on-stack-change:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select watch target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "7 */4 * * *" ]]; then
              echo "stack_image=ghcr.io/helmerznl/discvault:latest" >> "$GITHUB_OUTPUT"
              echo "launcher_tag=latest" >> "$GITHUB_OUTPUT"
            elif [[ "${{ github.event.schedule }}" == "17 */4 * * *" ]]; then
              echo "stack_image=ghcr.io/helmerznl/discvault:beta" >> "$GITHUB_OUTPUT"
              echo "launcher_tag=beta" >> "$GITHUB_OUTPUT"
            elif [[ "${{ github.event.schedule }}" == "47 */4 * * *" ]]; then
              echo "stack_image=ghcr.io/helmerznl/discvault:dev" >> "$GITHUB_OUTPUT"
              echo "launcher_tag=dev" >> "$GITHUB_OUTPUT"
            elif [[ "${{ github.event.schedule }}" == "27 */4 * * *" ]]; then
              echo "stack_image=ghcr.io/helmerznl/discvault:v26" >> "$GITHUB_OUTPUT"
              echo "launcher_tag=v26" >> "$GITHUB_OUTPUT"
            elif [[ "${{ github.event.schedule }}" == "37 */4 * * *" ]]; then
              echo "stack_image=ghcr.io/helmerznl/discvault:v26-beta" >> "$GITHUB_OUTPUT"
              echo "launcher_tag=v26-beta" >> "$GITHUB_OUTPUT"
            else
              echo "stack_image=ghcr.io/helmerznl/discvault:beta" >> "$GITHUB_OUTPUT"
              echo "launcher_tag=beta" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "stack_image=${{ github.event.inputs.stack_image || 'ghcr.io/helmerznl/discvault:beta' }}" >> "$GITHUB_OUTPUT"
            echo "launcher_tag=${{ github.event.inputs.launcher_tag || 'beta' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve stack digest
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          stack_image="${{ steps.target.outputs.stack_image }}"
          digest="$(docker buildx imagetools inspect "$stack_image" --format '{{.Manifest.Digest}}')"
          if [[ -z "$digest" || "$digest" == "<nil>" ]]; then
            echo "Could not resolve manifest digest for $stack_image" >&2
            exit 1
          fi
          short="${digest#sha256:}"
          echo "stack_image=$stack_image" >> "$GITHUB_OUTPUT"
          echo "stack_digest=$digest" >> "$GITHUB_OUTPUT"
          echo "stack_digest_short=${short:0:12}" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          launcher_tag="${{ steps.target.outputs.launcher_tag }}"
          force="${{ github.event.inputs.force || 'false' }}"
          current="${{ steps.digest.outputs.stack_digest }}"
          digest_tag="${REGISTRY}/${IMAGE_NAME}:${launcher_tag}-stack-${{ steps.digest.outputs.stack_digest_short }}"
          existing_digest_tag=false
          if docker buildx imagetools inspect "$digest_tag" >/dev/null 2>&1; then
            existing_digest_tag=true
          fi

          should_publish=false
          if [[ "$force" == "true" || "$existing_digest_tag" != "true" ]]; then
            should_publish=true
          fi

          echo "launcher_tag=$launcher_tag" >> "$GITHUB_OUTPUT"
          echo "digest_tag=$digest_tag" >> "$GITHUB_OUTPUT"
          echo "existing_digest_tag=$existing_digest_tag" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          {
            echo "launcher_tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}:${launcher_tag}"
            echo "$digest_tag"
            if [[ "$launcher_tag" == "latest" ]]; then
              echo "${REGISTRY}/${IMAGE_NAME}:legacy"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Stack update watch"
            echo ""
            echo "- Stack image: \`${{ steps.digest.outputs.stack_image }}\`"
            echo "- Current digest: \`$current\`"
            echo "- Launcher tag: \`$launcher_tag\`"
            echo "- Digest tag: \`$digest_tag\`"
            echo "- Existing digest tag: \`$existing_digest_tag\`"
            echo "- Publish: \`$should_publish\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push launcher
        if: steps.plan.outputs.should_publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.plan.outputs.launcher_tags }}
          labels: |
            org.opencontainers.image.title=DiscVault Launcher
            org.opencontainers.image.description=Unraid Community Apps launcher for the DiscVault Docker stack.
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            eu.discvault.stack.image=${{ steps.digest.outputs.stack_image }}
            eu.discvault.stack.digest=${{ steps.digest.outputs.stack_digest }}
          build-args: |
            DISCVAULT_STACK_IMAGE=${{ steps.digest.outputs.stack_image }}
            DISCVAULT_STACK_DIGEST=${{ steps.digest.outputs.stack_digest }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

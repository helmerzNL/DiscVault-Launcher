name: Build & Publish DiscVault Launcher

on:
  push:
    branches:
      - main
      - release/v26-dev
      - release/v26-beta
      - release/v26
    tags:
      - "v26.*.*"
  workflow_dispatch:
    inputs:
      stack_image:
        description: DiscVault app image baked into the launcher when DISCVAULT_IMAGE=auto.
        required: false
        default: ghcr.io/helmerznl/discvault:latest
      launcher_tag:
        description: Launcher tag to publish.
        required: false
        default: latest

concurrency:
  group: launcher-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.launcher_tag || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: helmerznl/discvault-launcher

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select default stack image
        id: stack-target
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image="${{ github.event.inputs.stack_image || 'ghcr.io/helmerznl/discvault:latest' }}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            image="ghcr.io/helmerznl/discvault:latest"
          elif [[ "${GITHUB_REF}" == "refs/heads/release/v26-dev" ]]; then
            image="ghcr.io/helmerznl/discvault:dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/release/v26-beta" ]]; then
            image="ghcr.io/helmerznl/discvault:v26-beta"
          elif [[ "${GITHUB_REF}" == "refs/heads/release/v26" ]]; then
            image="ghcr.io/helmerznl/discvault:v26"
          elif [[ "${GITHUB_REF}" == refs/tags/v26.* ]]; then
            image="ghcr.io/helmerznl/discvault:${GITHUB_REF_NAME}"
          else
            image="ghcr.io/helmerznl/discvault:v26-beta"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Resolve default stack digest
        id: stack
        shell: bash
        run: |
          set -euo pipefail
          stack_image="${{ steps.stack-target.outputs.image }}"
          digest="$(docker buildx imagetools inspect "$stack_image" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
          if [[ -z "$digest" || "$digest" == "<nil>" ]]; then
            digest="unknown"
          fi
          echo "image=$stack_image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=legacy,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/release/v26-dev' }}
            type=raw,value=v26-beta,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/release/v26-beta' }}
            type=raw,value=v26,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/release/v26' }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v26.') }}
            type=raw,value=${{ github.event.inputs.launcher_tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=DiscVault Launcher
            org.opencontainers.image.description=Unraid Community Apps launcher for the DiscVault Docker stack.
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            eu.discvault.stack.image=${{ steps.stack.outputs.image }}
            eu.discvault.stack.digest=${{ steps.stack.outputs.digest }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DISCVAULT_STACK_IMAGE=${{ steps.stack.outputs.image }}
            DISCVAULT_STACK_DIGEST=${{ steps.stack.outputs.digest }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

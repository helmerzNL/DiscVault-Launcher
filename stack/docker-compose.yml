services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discvault_next}
      POSTGRES_USER: ${POSTGRES_USER:-discvault_next}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Europe/Amsterdam}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - discvault

  next-api:
    image: ${DISCVAULT_IMAGE:-ghcr.io/helmerznl/discvault:beta}
    restart: unless-stopped
    working_dir: /opt/discvault/backend
    command:
      [
        "sh",
        "-c",
        "python next_database.py migrate && exec gunicorn --bind 0.0.0.0:5000 --workers ${DISCVAULT_NEXT_API_WORKERS:-2} --timeout ${DISCVAULT_NEXT_API_TIMEOUT:-180} next_app:app"
      ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-discvault_next}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-discvault_next}
      TZ: ${TZ:-Europe/Amsterdam}
      DISCVAULT_LEGACY_DATA_DIR: /data
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      RP_ID: ${RP_ID:-localhost}
      RP_NAME: ${RP_NAME:-DiscVault}
      RP_ORIGINS: ${RP_ORIGINS:-http://localhost:6180}
      DISCVAULT_NEXT_ENABLE_TEST_RESET: ${DISCVAULT_NEXT_ENABLE_TEST_RESET:-false}
    volumes:
      - ${DISCVAULT_DATA_DIR:-./data}:/data
    ports:
      - "${DISCVAULT_WEB_PORT:-6180}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/next/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - discvault

  next-worker:
    image: ${DISCVAULT_IMAGE:-ghcr.io/helmerznl/discvault:beta}
    restart: unless-stopped
    working_dir: /opt/discvault/backend
    command: ["python", "next_worker.py", "work"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-discvault_next}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-discvault_next}
      TZ: ${TZ:-Europe/Amsterdam}
      DISCVAULT_WORKER_ID: ${DISCVAULT_WORKER_ID:-next-worker-1}
      DISCVAULT_WORKER_POLL_INTERVAL: ${DISCVAULT_WORKER_POLL_INTERVAL:-2}
      DISCVAULT_LEGACY_DATA_DIR: /data
    volumes:
      - ${DISCVAULT_DATA_DIR:-./data}:/data
    depends_on:
      next-api:
        condition: service_healthy
    networks:
      - discvault

volumes:
  postgres-data:

networks:
  discvault:
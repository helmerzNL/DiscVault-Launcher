services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${DISCVAULT_POSTGRES_DATA_DIR_HOST}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - discvault-stack

  next-api:
    image: ${DISCVAULT_IMAGE}
    restart: unless-stopped
    working_dir: /opt/discvault/backend
    command:
      [
        "sh",
        "-c",
        "python next_database.py migrate && exec gunicorn --bind 0.0.0.0:5000 --workers ${DISCVAULT_NEXT_API_WORKERS} --timeout ${DISCVAULT_NEXT_API_TIMEOUT} next_app:app"
      ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TZ: ${TZ}
      DISCVAULT_LEGACY_DATA_DIR: /data
      JWT_SECRET: ${JWT_SECRET}
      RP_ID: ${RP_ID}
      RP_NAME: ${RP_NAME}
      RP_ORIGINS: ${RP_ORIGINS}
      DISCVAULT_NEXT_ENABLE_TEST_RESET: ${DISCVAULT_NEXT_ENABLE_TEST_RESET}
    volumes:
      - ${DISCVAULT_DATA_DIR_HOST}:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/next/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - discvault-stack

  next-worker:
    image: ${DISCVAULT_IMAGE}
    restart: unless-stopped
    working_dir: /opt/discvault/backend
    command: ["python", "next_worker.py", "work"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TZ: ${TZ}
      DISCVAULT_WORKER_ID: ${DISCVAULT_WORKER_ID}
      DISCVAULT_WORKER_POLL_INTERVAL: ${DISCVAULT_WORKER_POLL_INTERVAL}
      DISCVAULT_LEGACY_DATA_DIR: /data
    volumes:
      - ${DISCVAULT_DATA_DIR_HOST}:/data
    depends_on:
      next-api:
        condition: service_healthy
    networks:
      - discvault-stack

networks:
  discvault-stack:
    external: true
    name: ${DISCVAULT_NETWORK}